<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Aashish Ashwin R</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );
    min-height:100vh;
    color:white;
}

.hero{
    background:linear-gradient(
        135deg,
        #141e30,
        #243b55
    );
    padding:100px 10%;
}

.hero h1{
    font-size:55px;
    margin-bottom:10px;
}

.hero p{
    color:#cbd5e1;
    font-size:18px;
}

.container{
    max-width:1100px;
    margin:-40px auto 50px;
    padding:20px;
}

.card{
    background:rgba(30,41,59,0.8);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
    padding:30px;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card h2{
    color:#60a5fa;
    margin-bottom:15px;
}

.card p{
    color:#cbd5e1;
    line-height:1.8;
    margin-bottom:10px;
}

.contact-item{
    background:#2563eb;
    padding:12px 18px;
    border-radius:10px;
    margin:10px 0;
    display:inline-block;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.contact-item:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input,
textarea{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:16px;
}

input::placeholder,
textarea::placeholder{
    color:#cbd5e1;
}

textarea{
    resize:none;
    height:150px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}

button:hover{
    background:#1d4ed8;
}

.home-section{
    text-align:center;
    margin-top:30px;
}

.home-btn{
    display:inline-block;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    text-decoration:none;
    padding:14px 32px;
    border-radius:12px;
    font-weight:600;
    font-size:16px;
    box-shadow:0 8px 20px rgba(37,99,235,0.3);
    transition:0.3s;
}

.home-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(37,99,235,0.5);
}

</style>
</head>
<body>

<section class="hero">

    <h1>Contact Me</h1>

    <p>
        Let's connect and discuss opportunities, projects, or collaborations.
    </p>

</section>

<div class="container">

    <div class="card">

        <h2>Contact Information</h2>

        <a href="mailto:aaashishrk@gmail.com" class="contact-item">
            📧 aaashishrk@gmail.com
        </a>

        <br>

        <a href="https://www.linkedin.com/in/aashish-ashwin-r-551829414"
           target="_blank"
           class="contact-item">
            💼 LinkedIn Profile
        </a>

        <br>

        <a href="tel:+91XXXXXXXXXX" class="contact-item">
            📱 +91 XXXXX XXXXX
        </a>

    </div>

    <div class="card">

        <h2>Send a Message</h2>

       <form>

    <input type="text" name="name" placeholder="Your Name">

    <input type="email" name="email" placeholder="Your Email">

    <textarea name="message" placeholder="Your Message"></textarea>

    <button type="submit">
        Send Message
    </button>

</form>
        <div class="home-section">

            <a href="index.html" class="home-btn">
                🏠 Back to Home
            </a>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("C6cBrJfYhLefGvsP9");

document.querySelector("form").addEventListener("submit", function(e){

    e.preventDefault();

    emailjs.send(
        "service_4dxcfma",
        "template_0af3mdh",
        {
            name: document.querySelector('input[type="text"]').value,
            email: document.querySelector('input[type="email"]').value,
            message: document.querySelector('textarea').value
        }
    )
    .then(function(){

        alert("Message sent successfully!");
        document.querySelector("form").reset();

    })
    .catch(function(error){

        alert("Failed to send message!");
        console.log(error);

    });

});
</script>
</body>
</html>
